baseURL = "https://vanperdung.github.io/"
languageCode = "en-us"
title = "vanperdung's notes"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  author = "vanperdung"
  description = "Notes on things I learn."
  defaultTheme = "auto"        # auto | light | dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hi, I'm vanperdung"
    Content = "This is where I store things - programming, OS, tools, and more."

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/vanperdung"

[menu]
  [[menu.main]]
    identifier = "notes"
    name       = "Notes"
    url        = "/notes/"
    weight     = 1
  [[menu.main]]
    identifier = "tags"
    name       = "Tags"
    url        = "/tags/"
    weight     = 2
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON needed for search
