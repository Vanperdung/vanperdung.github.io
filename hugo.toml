baseURL = "https://vanperdung.github.io/"
languageCode = "en-us"
title = "vanperdung's notes"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[params]
  author = "vanperdung"
  description = "Notes on things I learn."
  defaultTheme = "auto"        # auto | light | dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.viewCounter]
    enabled = true
    namespace = "vanperdung-github-io"
    apiURL = "https://api.counterapi.dev/v1"

  [params.homeInfoParams]
    Title = "Hi, I'm vanperdung"
    Content = "This is where I store random things."

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/vanperdung"

[menu]
  [[menu.main]]
    identifier = "notes"
    name       = "Notes"
    url        = "/notes/"
    weight     = 1
  [[menu.main]]
    identifier = "tags"
    name       = "Tags"
    url        = "/tags/"
    weight     = 2
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON needed for search
